<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Duban International |</title>
    <meta
      name="description"
      content="Showcasing Nigeria's finest achievements, culture, and heroes across various sectors"
    />
    <meta name="theme-color" content="#166534" />

    <link rel="icon" type="image/svg+xml" href="/DubanLogoWhite.png" />

    <!-- ✅ Prevent dark/light flash on refresh -->
    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        const darkMode = localStorage.getItem("darkMode");

        const isDark =
          theme === "dark" ||
          (!theme && darkMode === "true") ||
          (!theme && darkMode === null); // default to dark

        if (isDark) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
